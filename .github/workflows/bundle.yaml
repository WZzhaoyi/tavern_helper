name: bundle

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - dist/**
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JesseTG/rm@v1.0.3
        with:
          path: dist

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install && pnpm build
      - name: Only keep 角色卡示例 in dist for template upstream
        if: github.repository == 'StageDog/tavern_helper_template'
        run: |
          mv dist/角色卡示例 角色卡示例
          rm -rf dist
          mkdir dist
          mv 角色卡示例 dist/
      - name: Remove 示例 in dist for templated repository
        if: github.repository != 'StageDog/tavern_helper_template'
        run: |
          rm -rf dist/角色卡示例 dist/脚本示例 dist/流式楼层界面示例 dist/前端界面示例
      - name: Create bundle pull request
        id: bundle_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BUNDLE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: '[bot] bundle'
          title: '[bot] bundle'
          body: 自动打包 src 和 tavern_sync.yaml 生成的 dist 产物。
          branch: chore/bundle-dist
          delete-branch: true
          add-paths: |
            dist/**

      - name: Enable auto-merge for bundle pull request
        if: steps.bundle_pr.outputs.pull-request-number != ''
        run: gh pr merge ${{ steps.bundle_pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.BUNDLE_PR_TOKEN || secrets.GITHUB_TOKEN }}
